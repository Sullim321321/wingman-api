# One-click-ish deploy of the Wingman API to Render (render.com).
# 1. Push wingman-api to a GitHub repo.
# 2. Render dashboard → New → Blueprint → pick the repo. This file does the rest.
# 3. Copy the service's https URL into wingman-app/src/config.js (API_BASE).
services:
  - type: web
    name: wingman-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # "beta" (not "production") keeps the dev sign-in code auto-filling, so
      # TestFlight testers can sign in without an email provider wired up.
      # Switch to "production" + a real email sender before a public launch.
      - key: NODE_ENV
        value: beta
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
    value: 0138c4cf75f974d3bbe8d982123f5f34734f5d66de9c83f1f785c1dff7fc7839
  - key: OPENWEATHER_API_KEY
        value: fc81010424b80a83d0a6b4ebf28ad6a6
